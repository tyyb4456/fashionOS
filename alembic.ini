# FashionOS -- Alembic Configuration
# DATABASE_URL is NOT set here -- env.py reads it from the environment
# and converts postgresql+asyncpg:// -> postgresql:// for the sync migration runner.
#
# Usage:
#   alembic upgrade head         <- apply all migrations
#   alembic downgrade -1         <- roll back one step
#   alembic revision --autogenerate -m "add brands table"
#   alembic history --verbose

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Placeholder -- overridden in env.py
sqlalchemy.url = postgresql://fashionos:fashionos_dev@localhost:5432/fashionos

[post_write_hooks]
# Optional: black auto-format on new migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S