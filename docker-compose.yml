# ── VOLUMES ───────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  chroma_data:
    driver: local

# ── NETWORK ───────────────────────────────────────────────────────────────────

networks:
  default:
    name: fashionos_net
    driver: bridge