# ═══════════════════════════════════════════════════════════════════════════════
# FashionOS — Local Development Stack (session 8 — notify-mcp added)
# ═══════════════════════════════════════════════════════════════════════════════
# Ports:
#   5432  → PostgreSQL
#   6379  → Redis
#   8000  → ChromaDB
#   8001  → shopify-mcp
#   8002  → social-mcp
#   8003  → trends-mcp
#   8004  → ads-mcp
#   8005  → notify-mcp  ← NEW session 8
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── INFRASTRUCTURE ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:17-alpine
    container_name: fashionos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       fashionos
      POSTGRES_USER:     fashionos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fashionos_dev}
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fashionos -d fashionos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:8-alpine
    container_name: fashionos_redis
    restart: unless-stopped
    command: >
      redis-server --appendonly yes --appendfsync everysec
                   --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    container_name: fashionos_chroma
    restart: unless-stopped
    volumes: [chroma_data:/data]
    ports: ["8000:8000"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── MCP SERVERS ──────────────────────────────────────────────────────────────

  shopify-mcp:
    build: { context: ./mcp_servers/shopify_mcp, dockerfile: Dockerfile }
    container_name: fashionos_shopify_mcp
    restart: unless-stopped
    env_file: ./mcp_servers/shopify_mcp/.env
    environment:
      REDIS_URL: redis://redis:6379/0   # ← add this
    depends_on:
      redis: { condition: service_healthy }
    ports: ["8001:8001"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket,sys;s=socket.socket();s.settimeout(3);s.connect(('localhost',8001));s.close()\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  social-mcp:
    build: { context: ./mcp_servers/social_mcp, dockerfile: Dockerfile }
    container_name: fashionos_social_mcp
    restart: unless-stopped
    env_file: ./mcp_servers/social_mcp/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis: { condition: service_healthy }
    ports: ["8002:8002"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket,sys;s=socket.socket();s.settimeout(3);s.connect(('localhost',8002));s.close()\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  trends-mcp:
    build: { context: ./mcp_servers/trends_mcp, dockerfile: Dockerfile }
    container_name: fashionos_trends_mcp
    restart: unless-stopped
    environment:
      TRENDS_DEFAULT_GEO: PK
    ports: ["8003:8003"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket,sys;s=socket.socket();s.settimeout(3);s.connect(('localhost',8003));s.close()\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  ads-mcp:
    build: { context: ./mcp_servers/ads_mcp, dockerfile: Dockerfile }
    container_name: fashionos_ads_mcp
    restart: unless-stopped
    env_file: ./mcp_servers/ads_mcp/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis: { condition: service_healthy }
    ports: ["8004:8004"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket,sys;s=socket.socket();s.settimeout(3);s.connect(('localhost',8004));s.close()\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  notify-mcp:                                  # NEW session 8
    build: { context: ./mcp_servers/notify_mcp, dockerfile: Dockerfile }
    container_name: fashionos_notify_mcp
    restart: unless-stopped
    env_file: ./mcp_servers/notify_mcp/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis: { condition: service_healthy }
    ports: ["8005:8005"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket,sys;s=socket.socket();s.settimeout(3);s.connect(('localhost',8005));s.close()\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  fashionos-api:
      build: { context: ., dockerfile: Dockerfile }
      container_name: fashionos_api
      command: ["api"]
      env_file: .env
      environment:
        REDIS_URL: redis://redis:6379/0
        DATABASE_URL: postgresql+asyncpg://fashionos:fashionos_dev@postgres:5432/fashionos
      ports:
        - "8080:8080"
      depends_on:
        redis:    { condition: service_healthy }
        postgres: { condition: service_healthy }

  fashionos-worker:
      build: { context: ., dockerfile: Dockerfile }
      container_name: fashionos_worker
      command: ["worker-beat"]
      env_file: .env
      volumes:
      - ./deep_agents/memory:/app/deep_agents/memory
      environment:
        REDIS_URL: redis://redis:6379/0        # ← service name, not localhost
        DATABASE_URL: postgresql+asyncpg://fashionos:fashionos_dev@postgres:5432/fashionos
        SHOPIFY_MCP_URL: http://shopify-mcp:8001/mcp
        SOCIAL_MCP_URL:  http://social-mcp:8002/mcp
        TRENDS_MCP_URL:  http://trends-mcp:8003/mcp
        ADS_MCP_URL:     http://ads-mcp:8004/mcp
        NOTIFY_MCP_URL:  http://notify-mcp:8005/mcp
      depends_on:
        redis:       { condition: service_healthy }
        postgres:    { condition: service_healthy }
      restart: unless-stopped


  fashionos-migrate:
      build: { context: ., dockerfile: Dockerfile }
      container_name: fashionos_migrate
      command: ["migrate"]
      env_file: .env
      environment:
        DATABASE_URL: postgresql+asyncpg://fashionos:fashionos_dev@postgres:5432/fashionos
      depends_on:
        postgres: { condition: service_healthy }
      profiles: ["tools"]      # ← only runs when explicitly called
      restart: "no"

volumes:
  postgres_data:
  redis_data:
  chroma_data:

networks:
  default:
    name: fashionos_net
    driver: bridge

